services:
  - type: web
    name: golden-coffee-erp
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma db push && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        value: https://erp-manufactyr-1.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: SEED_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: golden-coffee-db
          property: connectionString

databases:
  - name: golden-coffee-db
    databaseName: golden_coffee
    user: postgres
    plan: free
